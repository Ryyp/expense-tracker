<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <style>
        body {
            font-family: '72', Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #0070f2;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 40px;
        }
        .tiles {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .tile {
            background-color: #0070f2;
            color: white;
            padding: 40px 20px;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
            display: block;
        }
        .tile:hover {
            transform: translateY(-4px);
            box-shadow: 0 4px 16px rgba(0,112,242,0.3);
        }
        .tile h2 {
            margin: 0 0 10px 0;
            font-size: 24px;
        }
        .tile p {
            margin: 0;
            opacity: 0.9;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Expense Tracker</h1>
        <p class="subtitle">Personal Budget and Transaction Management</p>

        <div class="tiles">
            <a href="/transactions/webapp/index.html" class="tile">
                <h2>Transactions</h2>
                <p>Manage your expense transactions</p>
            </a>
            <a href="/budget/webapp/index.html" class="tile">
                <h2>Budget</h2>
                <p>Set and manage your budget</p>
            </a>
        </div>
    </div>
</body>
</html>
