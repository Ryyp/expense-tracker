_schema-version: '3.1'
ID: expense-tracker
version: 1.0.0
description: Personal Expense Tracker Application (Java - Multi-Module)

parameters:
  enable-parallel-deployments: true
  deploy_mode: html5-repo

build-parameters:
  before-all:
    - builder: custom
      commands:
        - mvn clean package -DskipTests -f pom.xml

modules:
  # --------------------- JAVA SERVER MODULE ---------------------
  - name: expense-tracker-srv
    type: java
    path: srv
    parameters:
      buildpack: sap_java_buildpack
      memory: 1024M
      disk-quota: 1024M
      JBP_CONFIG_COMPONENTS: "jres: ['com.sap.xs.java.buildpack.jre.SAPMachineJRE']"
      JBP_CONFIG_SAP_MACHINE_JRE: '{ version: 21.+ }'
      USE_JDK: 21
    build-parameters:
      builder: custom
      commands:
        - mvn clean package -DskipTests -f pom.xml
      build-result: target/*.jar
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    requires:
      - name: expense-tracker-db
      - name: expense-tracker-uaa
    properties:
      SPRING_PROFILES_ACTIVE: cloud
      JBP_CONFIG_SPRING_AUTO_RECONFIGURATION: '{enabled: true}'

  # --------------------- DATABASE MODULE ---------------------
  - name: expense-tracker-db-deployer
    type: hdb
    path: db
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
      disk-quota: 512M
    build-parameters:
      builder: custom
      commands:
        - npm install
        - npx cds build --production
    requires:
      - name: expense-tracker-db

  # --------------------- APPROUTER MODULE ---------------------
  - name: expense-tracker-approuter
    type: approuter.nodejs
    path: app
    parameters:
      keep-existing-routes: true
      memory: 256M
      disk-quota: 512M
    properties:
      TENANT_HOST_PATTERN: "^(.*)-${default-uri}"
    requires:
      - name: expense-tracker-uaa
      - name: srv-api
        group: destinations
        properties:
          name: srv-api
          url: ~{srv-url}
          forwardAuthToken: true

resources:
  # --------------------- DATABASE ---------------------
  - name: expense-tracker-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared

  # --------------------- UAA SERVICE ---------------------
  - name: expense-tracker-uaa
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: expense-tracker-${org}-${space}
        tenant-mode: dedicated
        role-collections:
          - name: ExpenseTracker_Admin
            description: Expense Tracker Administrator
            role-template-references:
              - $XSAPPNAME.Admin
          - name: ExpenseTracker_User
            description: Expense Tracker User
            role-template-references:
              - $XSAPPNAME.User
